name: typecheck

# Runs the same typecheck the Spark coding agent runs (AGENTS.md test command),
# so agent PRs get a real green/red status check that the auto-merge gate can trust.
on:
  pull_request:
    branches: [master]

jobs:
  tsc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx --no-install tsc --noEmit
